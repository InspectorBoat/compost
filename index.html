<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="flare.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
</head>
<body>
    <center>
        <h1>Welcome to Compostable!</h1>
        <p>Compostable is an innovative new tool to help you sort your recycling, compost, and trash into the correct container depending on local regulations.</p>
        <h1>Waste lookup</h1>
                <div style="position:relative; max-width:420px;">
                    <input id="query" placeholder="Enter item" autocomplete="off" />
                    <div id="suggestions" role="listbox" style="position:absolute;left:0;right:0;background:#fff;border:1px solid #ccc;display:none;z-index:10;max-height:200px;overflow:auto;"></div>
                </div>
                <button id="check">Check</button>
                <p id="result">Result will appear here.</p>
    </center>

    <script type="module">
                import { findWasteCategory } from './compostable.js';

                const queryEl = document.getElementById('query');
                const btn = document.getElementById('check');
                const res = document.getElementById('result');
                const suggestionsEl = document.getElementById('suggestions');

                // simple debounce
                function debounce(fn, wait=250){
                    let t;
                    return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
                }

                async function updateSuggestions(q){
                    if (!q) { suggestionsEl.style.display='none'; return; }
                    const out = await findWasteCategory(q);
                    if (out.matches && out.matches.length>0){
                        suggestionsEl.innerHTML = out.matches.map(m => `<div role="option" tabindex="0" class="sugg">${m.item}</div>`).join('');
                        suggestionsEl.style.display = 'block';
                        Array.from(suggestionsEl.querySelectorAll('.sugg')).forEach(el => {
                            el.addEventListener('click', () => { queryEl.value = el.textContent; suggestionsEl.style.display='none'; btn.click(); });
                            el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ el.click(); } });
                        });
                    } else {
                        suggestionsEl.style.display='none';
                    }
                }

                const debounced = debounce((e)=> updateSuggestions(e.target.value.trim()));
                queryEl.addEventListener('input', debounced);

                // allow Enter to run search
                queryEl.addEventListener('keydown', (e)=>{
                    if (e.key === 'Enter') { e.preventDefault(); btn.click(); }
                    if (e.key === 'ArrowDown') { const first = suggestionsEl.querySelector('.sugg'); if(first){ first.focus(); } }
                });

                btn.addEventListener('click', async () => {
                        const q = queryEl.value.trim();
                        if (!q) {
                                res.textContent = 'Please enter an item.';
                                return;
                        }
                        res.textContent = 'Searching...';
                        const out = await findWasteCategory(q);
                        res.textContent = out.message || 'Item not found.';
                        suggestionsEl.style.display='none';
                });
    </script>
</body>
</html>
