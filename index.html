<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="flare.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
</head>
<body>
    <center>
        <h1>Welcome to Compostable!</h1>
        <p>Compostable is an innovative new tool to help you sort your recycling, compost, and trash into the correct container depending on local regulations.</p>
        <h1>Waste lookup</h1>
                <div style="position:relative; max-width:420px;">
                    <input id="item" placeholder="Enter item" autocomplete="off" />
                    <div id="item_suggestions" tabindex=-1 role="listbox" style="position:absolute;left:0;right:0;background:#fff;border:1px solid #ccc;display:none;z-index:10;max-height:200px;overflow:auto;"></div>
                </div>
                <div style="position:relative; max-width:420px;">
                    <input id="location" placeholder="Enter location" autocomplete="off" />
                    <div id="location_suggestions" role="listbox" style="position:absolute;left:0;right:0;background:#fff;border:1px solid #ccc;display:none;z-index:10;max-height:200px;overflow:auto;"></div>
                </div>
                <button id="check">Check</button>
                <p id="result">Result will appear here.</p>
    </center>

    <script type="module">
                import { findWasteCategory, findSuggestions } from './compostable.js';
                // `classifyWaste` now calls the server `/api/classify` so client-side keys are not required.
                import { classifyWaste } from './gemini.js';

                // Diagnostic logs to help trace module loading/errors.
                console.log('[client] module loaded');
                window.addEventListener('error', (e) => console.error('[client] window error', e.error || e.message));
                window.addEventListener('unhandledrejection', (e) => console.error('[client] unhandledrejection', e.reason));

                const itemInput = document.getElementById('item');
                const locationInput = document.getElementById('location');
                const checkButton = document.getElementById('check');
                const resultField = document.getElementById('result');
                const suggestionsDiv = document.getElementById('item_suggestions');

                // simple debounce
                function debounce(fn, wait = 250) {
                    let t;
                    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
                }

                async function updateSuggestions(partialItem) {
                    if (partialItem === "") { suggestionsDiv.style.display = 'none'; return; }
                    const suggestions = await findSuggestions(partialItem);
                    console.log(suggestions);
                    if (suggestions.length > 0) {
                        suggestionsDiv.innerHTML = suggestions.map((m, i) => `<div role="option" tabindex="0" class="sugg">${m.item.item}</div>`).join('');
                        suggestionsDiv.style.display = 'block';
                        Array.from(suggestionsDiv.querySelectorAll('.sugg')).forEach(el => {
                            el.addEventListener('click', () => {
                                itemInput.value = el.textContent;
                                suggestionsDiv.style.display='none';
                            });
                            el.addEventListener('keydown', (e) => {
                                if (e.key === 'Enter') el.click();
                            });
                        });
                    } else {
                        suggestionsDiv.style.display = 'none';
                    }
                }

                // look for suggestions on input (after 250ms debounce)
                itemInput.addEventListener('input', debounce(e => updateSuggestions(e.target.value.trim())));

                // allow Enter to run search
                itemInput.addEventListener('keydown', (e)=>{
                    if (e.key === 'Enter') { e.preventDefault(); checkButton.click(); }
                    if (e.key === 'ArrowDown') { const first = suggestionsDiv.querySelector('.sugg'); if(first){ first.focus(); } }
                });

                checkButton.addEventListener('click', async () => {
                    console.log('[client] checkButton clicked');
                    const item = itemInput.value.trim();
                    const location = locationInput.value.trim();
                    console.log('[client] inputs', { item, location });
                        if (!item) {
                                resultField.textContent = 'Please enter an item.';
                                return;
                        }
                        if (!location) {
                                resultField.textContent = 'Please enter a location.';
                                return;
                        }
                        resultField.textContent = 'Searching...';
                    const wasteCategorySearch = await findWasteCategory(item, location);
                    console.log('[client] findWasteCategory result', wasteCategorySearch);
                    resultField.textContent = wasteCategorySearch.message || 'Item not found.';
                        suggestionsDiv.style.display='none';
                });
    </script>
</body>
</html>
